<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機色彩按鈕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8fafc;
            transition: background-color 0.8s ease;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- 點擊次數顯示 (左上角) -->
    <div class="fixed top-6 left-6 flex flex-col pointer-events-none">
        <span class="text-slate-400 text-xs uppercase tracking-widest font-bold">Total Clicks</span>
        <span id="clickCount" class="text-slate-800 text-4xl font-black tabular-nums">0</span>
    </div>

    <!-- 核心按鈕 -->
    <div class="flex-grow flex items-center justify-center">
        <button 
            id="mainButton"
            class="relative px-10 py-5 bg-slate-700 text-white text-xl font-bold rounded-xl shadow-md active:shadow-inner active:translate-y-0.5 transition-all duration-150 select-none min-w-[200px] cursor-pointer"
        >
            請點擊
        </button>
    </div>

    <script type="module">
        const btn = document.getElementById('mainButton');
        const body = document.body;
        const countDisplay = document.getElementById('clickCount');

        let count = 0;

        const messages = ["讚啦！", "點得好", "很有感", "再來一次", "非常有勁", "這下帥了", "感謝點擊", "厲害喔", "真不簡單", "棒極了"];
        
        const themes = [
            { bg: '#f8fafc', btn: 'bg-slate-700' },     // 石板
            { bg: '#eff6ff', btn: 'bg-blue-600' },      // 藍色
            { bg: '#f0fdf4', btn: 'bg-emerald-600' },   // 祖母綠
            { bg: '#fafaf9', btn: 'bg-stone-700' },     // 石頭
            { bg: '#f5f3ff', btn: 'bg-indigo-600' },    // 靛藍
            { bg: '#fff7ed', btn: 'bg-orange-600' },    // 橘色
            { bg: '#fff1f2', btn: 'bg-rose-600' },      // 玫瑰紅
            { bg: '#fdf4ff', btn: 'bg-fuchsia-600' },   // 紫紅
            { bg: '#ecfeff', btn: 'bg-cyan-600' },      // 青色
            { bg: '#fffbeb', btn: 'bg-amber-600' },     // 琥珀
            { bg: '#faf5ff', btn: 'bg-purple-600' },    // 紫色
            { bg: '#fdf2f8', btn: 'bg-pink-600' },      // 粉紅
            { bg: '#f7fee7', btn: 'bg-lime-600' }       // 萊姆綠
        ];

        // 點擊處理
        btn.addEventListener('click', () => {
            // 增加次數並更新顯示
            count++;
            countDisplay.textContent = count.toLocaleString();

            const theme = themes[Math.floor(Math.random() * themes.length)];
            const message = messages[Math.floor(Math.random() * messages.length)];
            
            // 更新背景顏色
            body.style.backgroundColor = theme.bg;
            
            // 更新按鈕文字與顏色
            btn.textContent = message;
            btn.className = `relative px-10 py-5 text-white text-xl font-bold rounded-xl shadow-md active:shadow-inner active:translate-y-0.5 transition-all duration-150 select-none min-w-[200px] cursor-pointer ${theme.btn}`;
        });

    </script>
</body>
</html>
